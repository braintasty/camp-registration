const calcFee = (f) => {
  const sessions = S.filter(x => f.sessions.includes(x.id));
  const num = sessions.length;
  const isEB = f.discounts.includes("earlybird");
  const isST = f.discounts.includes("student");
  const notFull = f.notFull === "是";
  const details = [];
  let total = 0;
  let warning = "";

  sessions.forEach(s => {
    if (s.id === "s1") {
      const base = isST ? 10899 : isEB ? 11990 : 13000;
      details.push({ label: `${s.s}（${s.d}）`, amount: base });
      total += base;
    } else {
      if (notFull) {
        details.push({ label: `${s.s}（${s.d}）— 不足五日，依實際天數計算`, amount: null });
        warning = "※ 不足五日之梯次，將以每日 $1,700 × 實際參加天數計算，確切金額請洽官方 LINE 確認。";
      } else {
        const base = isST ? 7200 : isEB ? 7700 : 8500;
        details.push({ label: `${s.s}（${s.d}）`, amount: base });
        total += base;
      }
    }
  });

  let groupDisc = 0;
  let groupLabel = "";
  if (f.discounts.includes("group10")) { groupDisc = 200; groupLabel = "超大團體(10人以上)"; }
  else if (f.discounts.includes("group5")) { groupDisc = 150; groupLabel = "大團體(5人以上)"; }
  else if (f.discounts.includes("group2")) { groupDisc = 100; groupLabel = "團報(2人以上)"; }
  if (groupDisc > 0) {
    details.push({ label: `${groupLabel}優惠`, amount: -groupDisc });
    total -= groupDisc;
    if (!warning) warning = "";
    warning += (warning ? "\n" : "") + "※ 團報優惠需確認同一團體名稱「" + (f.groupName||"") + "」的報名人數符合條件。";
  }

  if (num >= 2 && f.discounts.includes("multi")) {
    const multiDisc = (num - 1) * 100;
    details.push({ label: `多梯次優惠（${num}梯）`, amount: -multiDisc });
    total -= multiDisc;
  }

  return { total: Math.max(0, total), details, warning, notFull };
};
